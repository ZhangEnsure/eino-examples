# 腾讯云AGS配置
tencent:
  ags:
    secret_id: ""   # 通过环境变量 SANDBOX_SECRET_ID 注入
    secret_key: ""  # 通过环境变量 SANDBOX_SECRET_KEY 注入
    region: "ap-guangzhou"
  cos:
